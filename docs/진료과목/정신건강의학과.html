const PAGE_SIZE=15;

function filterSido(sido){curSido=sido;curPage=1;document.querySelectorAll('#sidoFilter .tab-btn').forEach(b=>b.classList.toggle('active',b.textContent===(sido||'전체')));applyFilter();}
